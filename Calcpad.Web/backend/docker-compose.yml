services:
  calcpad-server:
    build:
      context: ../..
      dockerfile: Calcpad.Web/backend/Dockerfile
    env_file:
      - .env.development
    ports:
      - "${CALCPAD_PORT:-9420}:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - CALCPAD_HOST=${CALCPAD_HOST:-*}
      - ASPNETCORE_URLS=http://+:8080
      - BROWSER_PATH=${BROWSER_PATH:-/usr/bin/chromium}
      - PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
    volumes:
      - calcpad-data:/app/data
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    tmpfs:
      - /tmp:noexec,nosuid,size=200m
    deploy:
      resources:
        limits:
          memory: ${CALCPAD_SERVER_MEMORY:-1g}
          cpus: '1.0'

volumes:
  calcpad-data:
